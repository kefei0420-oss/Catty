<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catty - 找猫猫</title>
    <link rel="stylesheet" href="styles.css?v=20260422-1608">
  </head>
  <body>
    <main class="game-shell">
      <section class="hero">
        <div class="brand">
          <span class="spark" aria-hidden="true"></span>
          <p>Catty</p>
        </div>
        <h1>找猫猫</h1>
        <p class="tagline">像素房间里，灰白小猫正在偷偷观察你。</p>
      </section>

      <section class="game-panel" aria-label="找猫猫游戏">
        <div class="hud">
          <div class="stat">
            <span>关卡</span>
            <strong id="levelText">1 / 5</strong>
          </div>
          <div class="stat">
            <span>时间</span>
            <strong id="timeText">45</strong>
          </div>
          <div class="stat">
            <span>发现</span>
            <strong id="scoreText">0</strong>
          </div>
          <div class="stat">
            <span>专注</span>
            <strong id="focusText">100</strong>
          </div>
          <button id="musicButton" class="icon-button" type="button" aria-label="音乐" title="音乐">♪</button>
          <button id="resetButton" class="icon-button" type="button" aria-label="重开" title="重开">↻</button>
        </div>

        <div class="case-bar">
          <span id="caseLabel">Case 01</span>
          <div>
            <strong id="caseTitle">读取猫猫地点中</strong>
            <p id="caseClue">请观察房间里的家具、阴影和反光。</p>
          </div>
          <button id="roundPhotoButton" class="round-photo" type="button" aria-label="查看本关猫猫照片" title="查看本关猫猫照片">
            <img id="roundPhotoThumb" src="" alt="本关猫猫照片">
          </button>
        </div>

        <div class="stage-wrap">
          <canvas id="gameCanvas" width="960" height="640" aria-label="像素猫猫房间"></canvas>
          <div id="toast" class="toast" role="status" aria-live="polite"></div>
          <div id="foundCard" class="found-card" aria-hidden="true">
            <img id="foundImage" src="" alt="找到的猫猫照片">
            <div>
              <p id="foundTitle">找到啦</p>
              <span id="foundNote">照片已收进猫猫档案。</span>
            </div>
          </div>
        </div>

        <div class="controls">
          <button id="hintButton" class="primary-button" type="button">线索</button>
          <button id="nextButton" class="primary-button" type="button" disabled>下一关</button>
        </div>
      </section>

      <section id="finalGallery" class="gallery-modal" aria-hidden="true" aria-label="猫猫照片奖励">
        <div class="gallery-panel">
          <div class="gallery-head">
            <div>
              <span>Reward</span>
              <h2>猫猫幻灯片</h2>
            </div>
            <button id="closeGalleryButton" class="icon-button" type="button" aria-label="关闭照片墙" title="关闭">×</button>
          </div>
          <div class="slide-stage">
            <button id="prevSlideButton" class="slide-button" type="button" aria-label="上一张">‹</button>
            <figure>
              <img id="slideImage" src="" alt="猫猫奖励幻灯片">
              <figcaption id="slideCaption">No. 01</figcaption>
            </figure>
            <button id="nextSlideButton" class="slide-button" type="button" aria-label="下一张">›</button>
          </div>
        </div>
      </section>

      <section id="photoModal" class="photo-modal" aria-hidden="true" aria-label="本关猫猫照片">
        <div class="photo-viewer">
          <button id="closePhotoButton" class="icon-button" type="button" aria-label="关闭照片" title="关闭">×</button>
          <img id="photoModalImage" src="" alt="本关猫猫大图">
        </div>
      </section>
    </main>

    <script src="game.js?v=20260422-1608"></script>
  </body>
</html>
